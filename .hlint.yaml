# HLint configuration file
# https://github.com/ndmitchell/hlint
##########################

# Run hlint with the following command to avoid tests and submodules:
#
# hlint `git ls-files | grep -v tests | grep -E "\.hs(|-boot|c)\$"`

# Warnings currently triggered by your code
- ignore: {name: "Unused LANGUAGE pragma"}
- ignore: {name: "Redundant do"}
- ignore: {name: "Redundant bracket"}
- ignore: {name: "Reduce duplication"}
- ignore: {name: "Eta reduce"}
- ignore: {name: "Use fromMaybe"}
- ignore: {name: "Use <$>"}
- ignore: {name: "Parse error"}
- ignore: {name: "Use camelCase"}
- ignore: {name: "Use :"}
- ignore: {name: "Redundant $"}
- ignore: {name: "Use record patterns"}
- ignore: {name: "Move brackets to avoid $"}
- ignore: {name: "Use sortOn"}
- ignore: {name: "Use list comprehension"}
- ignore: {name: "Use unwords"}
- ignore: {name: "Use fmap"}
- ignore: {name: "Use guards"}
- ignore: {name: "Redundant if"} # Due to PprCmmExpr.pprLocalReg which has some
                                 # rather confusing comments
- ignore: {name: "Use section"}
- ignore: {name: "Move guards forward"}
- ignore: {name: "Use void"}
- ignore: {name: "Use fewer imports"}
- ignore: {name: "Use unless"}
- ignore: {name: "Use tuple-section"}
- ignore: {name: "Redundant return"} # FastString.stringTable and
                                     # GHCi.InfoTable.newExecConItbl
                                     # return behind CPP
- ignore: {name: "Use let"}
- ignore: {name: "Avoid lambda using `infix`"}
- ignore: {name: "Use if"}
- ignore: {name: "Use when"}
- ignore: {name: "Use const"}
- ignore: {name: "Use uncurry"}
- ignore: {name: "Use map once"}
- ignore: {name: "Move map inside list comprehension"}
- ignore: {name: "Use >=>"}
- ignore: {name: "Use lambda-case"}
- ignore: {name: "Redundant guard"}
- ignore: {name: "Use ++"}
- ignore: {name: "Use forM"}
- ignore: {name: "Use <$"}
- ignore: {name: "Use String"}
- ignore: {name: "Use withFile"}
- ignore: {name: "Use intercalate"}
- ignore: {name: "Use =<<"}
- ignore: {name: "Use exitSuccess"}
- ignore: {name: "Evaluate"}
- ignore: {name: "Use notElem"}
- ignore: {name: "Use catMaybes"}
- ignore: {name: "Use ||"}
- ignore: {name: "Use infix"}
- ignore: {name: "Use $>"}
- ignore: {name: "Use negate"}
- ignore: {name: "Collapse lambdas"}
- ignore: {name: "Use >>"}
- ignore: {name: "Use list literal pattern"}
- ignore: {name: "Use &&"}
- ignore: {name: "Use null"}
- ignore: {name: "Redundant as"}
- ignore: {name: "Redundant case"}
- ignore: {name: "Use <=<"}
- ignore: {name: "Use otherwise"}
- ignore: {name: "Use -"}
- ignore: {name: "Use list literal"}
- ignore: {name: "Use =="}
- ignore: {name: "Redundant list comprehension"}
- ignore: {name: "Use putStrLn"}
- ignore: {name: "Use print"}


# Specify additional command line arguments
#
# - arguments: [--color, --cpp-simple, -XQuasiQuotes]

- arguments: [--cpp-simple]


# Control which extensions/flags/modules/functions can be used
#
# - extensions:
#   - default: false # all extension are banned by default
#   - name: [PatternGuards, ViewPatterns] # only these listed extensions can be used
#   - {name: CPP, within: CrossPlatform} # CPP can only be used in a given module
#
# - flags:
#   - {name: -w, within: []} # -w is allowed nowhere
#
# - modules:
#   - {name: [Data.Set, Data.HashSet], as: Set} # if you import Data.Set qualified, it must be as 'Set'
#   - {name: Control.Arrow, within: []} # Certain modules are banned entirely
#
# - functions:
#   - {name: unsafePerformIO, within: []} # unsafePerformIO can only appear in no modules


# Add custom hints for this project
#
# Will suggest replacing "wibbleMany [myvar]" with "wibbleOne myvar"
# - error: {lhs: "wibbleMany [x]", rhs: wibbleOne x}


# Turn on hints that are off by default
#
# Ban "module X(module X) where", to require a real export list
# - warn: {name: Use explicit module export list}
#
# Replace a $ b $ c with a . b $ c
# - group: {name: dollar, enabled: true}
#
# Generalise map to fmap, ++ to <>
# - group: {name: generalise, enabled: true}


# Ignore some builtin hints
# - ignore: {name: Use let}
# - ignore: {name: Use const, within: SpecialModule} # Only within certain modules

# Currently (2019-06) all suggestions are to replace
#    \ e w -> return (e, w)
# with
#    curry return
#
- ignore: {name: "Use curry"}

# The offending bits of code as of 2019-06 look more readable than the suggested
# replacements.
- ignore: {name: "Redundant lambda"}

- ignore: {name: "Avoid lambda"}

# Not much gain in readability.
- ignore: {name: "Fuse foldr/map"}
- ignore: {name: "Functor law"}
- ignore: {name: "Use isNothing"}

- ignore: {name: "Use elem", within: Data.Foldable}
- ignore: {name: "Use fold", within: Data.Foldable}
- ignore: {name: "Use traverse", within: Data.Traversable}
- ignore: {name: "Use zipWithM", within: GHC.Event.Thread} # Import cycle
- ignore: {name: "Use isDigit", within: GHC.Show} # Import cycle


# Define some custom infix operators
# - fixity: infixr 3 ~^#^~


# To generate a suitable file for HLint do:
# $ hlint --default > .hlint.yaml
